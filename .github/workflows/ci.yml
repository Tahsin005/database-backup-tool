name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Verify dependencies
        run: go mod tidy && git diff --exit-code go.sum

      - name: Build
        run: go build -o backuptool .

      - name: Vet
        run: go vet ./...